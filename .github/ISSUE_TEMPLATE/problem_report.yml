name: Problem report
description: Capture a workflow pain, debugging gap, or product limitation without proposing implementation.
labels: [problem]
body:
  - type: markdown
    attributes:
      value: "Describe the pain clearly. Do not include tokens, private payloads, secrets, or user data."
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What hurts?
      placeholder: "Today ..."
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Concrete examples, traces, screenshots, code paths, related issues, or safe live-usage notes.
      placeholder: "For example ..."
  - type: textarea
    id: desired-outcome
    attributes:
      label: Desired outcome
      description: What should become possible? Avoid implementation detail unless it is essential.
      placeholder: "I need to be able to ..."
    validations:
      required: true
  - type: textarea
    id: done-when
    attributes:
      label: Done when
      description: Keep this rough if the solution is not known yet.
      placeholder: |
        - ...
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Impact, related issues, risks, privacy/security, or implementation hints if actually useful.
      placeholder: "#123, impact, risks, security/privacy notes..."
  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      options:
        - low
        - medium
        - high
        - urgent
    validations:
      required: true
