name: Bug report
description: Report broken or surprising behavior.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not include tokens, private payloads, secrets, or user data. Redact logs before attaching them."
  - type: textarea
    id: what-broke
    attributes:
      label: What broke
      description: One paragraph is enough.
      placeholder: "When ..., Panda ..."
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Observed behavior, safe logs, timestamps, code paths, screenshots, or a live-usage report.
      placeholder: "Observed ..."
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area, if known
      options:
        - runtime
        - control
        - gateway
        - channels
        - providers
        - database
        - deploy
        - auth
        - tools
        - apps
        - docs
        - unknown
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      placeholder: "What should have happened?"
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who or what is blocked?
      placeholder: "This affects ..."
    validations:
      required: true
  - type: textarea
    id: done-when
    attributes:
      label: Done when
      placeholder: |
        - ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Repro, if available
      description: Leave this rough if it came from production or live usage.
      placeholder: |
        1. ...
        2. ...
        3. ...
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Workaround, suspected regression, environment/version, related issues, or privacy/security concerns if relevant.
      placeholder: "Workaround, first seen date, env, related issues, security notes..."
