name: Proposal
description: Use when the direction is already clear enough to describe.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: "Use this only when the lane is already chosen. For raw pain, use Problem. Do not include tokens, private payloads, secrets, or user data."
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Why should this exist?
      placeholder: "Today ..."
    validations:
      required: true
  - type: textarea
    id: direction
    attributes:
      label: Chosen direction
      description: The lane we are taking.
      placeholder: "Change ... so that ..."
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What changes?
      placeholder: "- ..."
    validations:
      required: true
  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals
      placeholder: "What should this explicitly not do?"
  - type: textarea
    id: done-when
    attributes:
      label: Done when
      placeholder: |
        - ...
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Focused proof, if known now.
      placeholder: "Tests, smoke, screenshot, logs, or manual proof."
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Related issues, risks, rollout, data/API impact, or privacy/security concerns if relevant.
      placeholder: "#123, risks, compatibility notes, security/privacy notes..."
  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      options:
        - low
        - medium
        - high
        - urgent
    validations:
      required: true
