name: Import Law Ratchet

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  import-law-ratchet:
    name: Import law ratchet
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run import-law ratchet
        run: pnpm architecture:import-law:ratchet
