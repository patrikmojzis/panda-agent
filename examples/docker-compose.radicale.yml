services:
  radicale:
    image: ${PANDA_RADICALE_IMAGE:-tomsquest/docker-radicale@sha256:5c4e81f84157169a4eadd10cddb7e51432f8ac2bdcbb6016bbaa2b75b40de9ee}
    restart: unless-stopped
    init: true
    environment:
      TZ: ${TZ:-UTC}
      TAKE_FILE_OWNERSHIP: ${PANDA_RADICALE_TAKE_FILE_OWNERSHIP:-true}
    volumes:
      - ${HOME}/.panda/radicale/data:/data
      - ${HOME}/.panda/radicale/config:/config:ro
    networks:
      - runner_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5232/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

networks:
  runner_net:
