services:
  panda-core:
    build:
      context: ..
      target: app
    image: panda-app:latest
    command: ["run"]
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - ${PANDA_STACK_SERVICE_ENV_FILE:-../.env}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      READONLY_DATABASE_URL: ${READONLY_DATABASE_URL:-}
      PANDA_CORE_HEALTH_PORT: ${PANDA_CORE_HEALTH_PORT:-8090}
      TELEPATHY_ENABLED: ${TELEPATHY_ENABLED:-}
      TELEPATHY_HOST: ${TELEPATHY_HOST:-0.0.0.0}
      TELEPATHY_PORT: ${TELEPATHY_PORT:-}
      TELEPATHY_PATH: ${TELEPATHY_PATH:-/telepathy}
      PANDA_APPS_HOST: ${PANDA_APPS_HOST:-0.0.0.0}
      PANDA_APPS_PORT: ${PANDA_APPS_PORT:-8092}
      PANDA_APPS_BASE_URL: ${PANDA_APPS_BASE_URL:-}
      PANDA_APPS_AUTH: ${PANDA_APPS_AUTH:-}
      PANDA_APPS_RATE_LIMIT_PER_MINUTE: ${PANDA_APPS_RATE_LIMIT_PER_MINUTE:-300}
      PANDA_APPS_INTERNAL_BASE_URL: ${PANDA_APPS_INTERNAL_BASE_URL:-http://panda-core:${PANDA_APPS_PORT:-8092}}
      BASH_EXECUTION_MODE: remote
      CODEX_HOME: /root/.codex
      RUNNER_URL_TEMPLATE: http://panda-runner-{agentKey}:8080
      RUNNER_CWD_TEMPLATE: /root/.panda/agents/{agentKey}
      PANDA_ENVIRONMENTS_ROOT: ${PANDA_ENVIRONMENTS_ROOT:-/root/.panda/environments}
      PANDA_RUNNER_ENVIRONMENTS_ROOT: ${PANDA_RUNNER_ENVIRONMENTS_ROOT:-/environments}
      BROWSER_RUNNER_URL: http://panda-browser-runner:8080
      BROWSER_RUNNER_SHARED_SECRET: ${BROWSER_RUNNER_SHARED_SECRET}
      TZ: ${TZ:-UTC}
    volumes:
      - ${HOME}/.panda:/root/.panda
      - ${PANDA_ENVIRONMENTS_HOST_ROOT:-${HOME}/.panda/environments}:${PANDA_ENVIRONMENTS_ROOT:-/root/.panda/environments}
      - ${CODEX_HOST_HOME:-${HOME}/.codex}:/root/.codex:ro
      - ${SHARED_ROOT:-${HOME}/.panda/shared}:/workspace/shared
      - /etc/ssl/certs/panda-postgres-ca.crt:/etc/ssl/certs/panda-postgres-ca.crt:ro
    depends_on:
      panda-browser-runner:
        condition: service_healthy
    networks:
      - runner_net
      - wiki_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${PANDA_CORE_HEALTH_PORT:-8090}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  panda-browser-runner:
    build:
      context: ..
      target: browser-runner
    image: panda-browser-runner:latest
    command: ["browser-runner"]
    restart: unless-stopped
    init: true
    user: pwuser
    ipc: host
    security_opt:
      - seccomp=${BROWSER_RUNNER_SECCOMP_PROFILE:-${PWD}/assets/playwright-seccomp-profile.json}
    environment:
      BROWSER_RUNNER_PORT: 8080
      BROWSER_RUNNER_SHARED_SECRET: ${BROWSER_RUNNER_SHARED_SECRET}
      BROWSER_RUNNER_DATA_DIR: /home/pwuser/.panda/browser-runner
      BROWSER_ALLOW_PRIVATE_HOSTS: ${BROWSER_ALLOW_PRIVATE_HOSTS:-panda-core}
      PANDA_DISPOSABLE_CONTAINER_PREFIX: ${PANDA_DISPOSABLE_CONTAINER_PREFIX:-panda-env}
      TZ: ${TZ:-UTC}
    volumes:
      - ${BROWSER_RUNNER_ROOT:-${HOME}/.panda-browser-runner}:/home/pwuser/.panda/browser-runner
    networks:
      - runner_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  panda-telegram:
    image: panda-app:latest
    command: ["telegram", "run"]
    restart: unless-stopped
    stop_grace_period: 30s
    profiles: ["telegram"]
    env_file:
      - ${PANDA_STACK_SERVICE_ENV_FILE:-../.env}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PANDA_TELEGRAM_HEALTH_PORT: ${PANDA_TELEGRAM_HEALTH_PORT:-8091}
      TZ: ${TZ:-UTC}
    volumes:
      - ${HOME}/.panda:/root/.panda
      - /etc/ssl/certs/panda-postgres-ca.crt:/etc/ssl/certs/panda-postgres-ca.crt:ro
    depends_on:
      panda-core:
        condition: service_healthy
    networks:
      - runner_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${PANDA_TELEGRAM_HEALTH_PORT:-8091}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  panda-whatsapp:
    image: panda-app:latest
    command: ["whatsapp", "run"]
    restart: unless-stopped
    stop_grace_period: 30s
    profiles: ["whatsapp"]
    env_file:
      - ${PANDA_STACK_SERVICE_ENV_FILE:-../.env}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      WHATSAPP_CONNECTOR_KEY: ${WHATSAPP_CONNECTOR_KEY:-main}
      PANDA_WHATSAPP_HEALTH_PORT: ${PANDA_WHATSAPP_HEALTH_PORT:-8093}
      TZ: ${TZ:-UTC}
    volumes:
      - ${HOME}/.panda:/root/.panda
      - /etc/ssl/certs/panda-postgres-ca.crt:/etc/ssl/certs/panda-postgres-ca.crt:ro
    depends_on:
      panda-core:
        condition: service_healthy
    networks:
      - runner_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${PANDA_WHATSAPP_HEALTH_PORT:-8093}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

networks:
  runner_net:
  wiki_net:
